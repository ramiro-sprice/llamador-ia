<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Llamador IA</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <p class="eyebrow">ARGENTINA · LLAMADAS CON IA</p>
    <h1>Una llamada clara,<br><em>antes de marcar.</em></h1>
    <p class="intro">Reproduce un aviso fijo y, después, conversa en español rioplatense mediante inteligencia artificial.</p>
    <form id="call-form">
      <label>Número argentino <input name="to" placeholder="+5491123456789" required></label>
      <label>Mensaje inicial <textarea name="fixedMessage" maxlength="1000" required>Hola, soy el asistente virtual de Sprice. Esta es una llamada automatizada. Ayudamos a empresas, negocios y emprendedores con páginas web, tiendas online y publicidad en Google y redes sociales. ¿Tenés un minuto para que te cuente?</textarea></label>
      <label>Guion de la conversación <textarea name="instructions" maxlength="4000" required>Sos el asistente virtual telefónico de Sprice. Hablá en español rioplatense, con tono profesional, cordial y natural. Usá frases breves y hacé una sola pregunta por turno. Escuchá la respuesta antes de avanzar. No recites todo el guion de una vez.

OBJETIVO: detectar una necesidad real y, solamente si hay interés, coordinar una segunda llamada con un asesor humano de Sprice.

SERVICIOS: diseño y actualización de páginas web, creación de tiendas online, publicidad en Google y publicidad en redes sociales.

FLUJO OBLIGATORIO:
1. El mensaje inicial ya informó que sos un asistente virtual y pidió permiso para continuar. Si la persona dice que no puede hablar, preguntá si prefiere otro momento. Si no quiere recibir la llamada, disculpate, despedite y terminá sin insistir.
2. Preguntá brevemente a qué se dedica la empresa, negocio o emprendimiento.
3. Preguntá: “¿Actualmente tienen una página web actualizada?”.
4. Si venden productos, preguntá: “¿Cómo puede ver la gente lo que venden o hacen actualmente?”.
5. Preguntá cuál de estas propuestas podría interesarle: página web, tienda online, publicidad en Google o publicidad en redes sociales.
6. Si muestra interés, explicá en una o dos frases cómo podría ayudar Sprice, sin inventar características, precios ni resultados.
7. Proponé una segunda llamada con un asesor humano. Preguntá qué día y franja horaria le resulta conveniente y confirmá la respuesta.
8. Cerrá agradeciendo el tiempo. Si no hay interés, agradecé y finalizá sin presionar.

REGLAS ESTRICTAS:
- Nunca digas ni prometas que un servicio es gratis.
- No prometas ventas, posiciones en Google, cantidades de clientes, plazos, descuentos, precios ni resultados garantizados.
- No inventes información sobre Sprice. Si no sabés algo, indicá que un asesor podrá responderlo.
- No solicites contraseñas, códigos, datos bancarios, tarjetas ni documentación sensible.
- No discutas, no presiones y respetá inmediatamente cualquier pedido de terminar la llamada.
- No confirmes una contratación: tu única acción comercial es coordinar una segunda llamada con un asesor.</textarea></label>
      <label class="check"><input type="checkbox" name="dryRun" checked> Modo simulación (no llama ni genera cargos)</label>
      <label>Clave administrativa <input name="adminToken" type="password" autocomplete="off" placeholder="Necesaria solo para llamadas reales"></label>
      <button type="submit">Preparar llamada <span>→</span></button>
      <p class="notice">Llamá únicamente a personas que hayan dado su consentimiento. No uses esta herramienta para spam, engaño ni emergencias.</p>
    </form>
    <output id="result" aria-live="polite"></output>
  </main>
  <script>
    const form = document.querySelector('#call-form');
    const result = document.querySelector('#result');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const data = new FormData(form);
      result.textContent = 'Validando…';
      const response = await fetch('/api/calls', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ to: data.get('to'), fixedMessage: data.get('fixedMessage'), instructions: data.get('instructions'), dryRun: data.get('dryRun') === 'on', adminToken: data.get('adminToken') }) });
      const body = await response.json();
      result.textContent = response.ok ? (body.message || `Llamada iniciada. Referencia: ${body.reference}`) : body.error;
      result.className = response.ok ? 'success' : 'error';
    });
  </script>
</body>
</html>
